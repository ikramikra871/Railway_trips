<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip {{ trip.code }} – Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>

    <nav>
        <a class="brand" href="/">Railway Trips</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/stats">Statistics</a>
        </div>
    </nav>

    <div class="container">

        <a class="back-link" href="/">All Trips</a>

        <div class="detail-card">

            <div class="trip-hero">
                <div class="trip-icon">🚆</div>
                <div>
                    <div class="trip-title">Trip {{ trip.code }}</div>
                    <div class="trip-type-label">
                        <span class="badge badge-{{ trip.type | lower }}">{{ trip.type }}</span>
                    </div>
                </div>
            </div>

            <div class="detail-row">
                <span class="detail-label">Departure</span>
                <span class="detail-value">{{ trip.departure }}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Arrival</span>
                <span class="detail-value">{{ trip.arrival }}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Train Type</span>
                <span class="detail-value">{{ trip.type }}</span>
            </div>

           
            <div class="detail-row">
                <span class="detail-label">Price</span>
                <span class="price-value">
                    {% for cls in trip.classes %}
                    <div>
                        {{ cls.type }}: {{ cls.price }}
                        <span style="font-size:0.9rem; color: var(--text-dim);">DA</span>
                    </div>
                    {% endfor %}
                </span>
            </div>

        </div>

    </div>

    <footer>DSS Project · Railway Trip Management · UMBB FS</footer>
</body>

</html>
